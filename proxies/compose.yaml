services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    tty: true
    container_name: proxies-app
    hostname: backend
    ports:
      - 3000:3000
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - default
  proxy:
    image: nginx:1.21.6
    container_name: proxies-proxy
    tty: true
    ports:
      - 80:80
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - default
    depends_on:
      - app

networks:
  default:
    driver: bridge
volumes:
  default:
    driver: local
